apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: dcgm-exporter-dashboard
    files:
      - dcgm-exporter-dashboard.json
  - name: vllm-serving-dashboard
    files:
      - vllm-serving-dashboard.json
