# `argocd` Dex staticClient (platform/dex/values.yaml). Populate the backend secret:
#   openssl rand -hex 32 | tr -d '\n' | gcloud secrets create dex-argocd-client-secret --data-file=- --project <projectID>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: argocd-dex-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: clientSecret
      remoteRef:
        key: dex-argocd-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
