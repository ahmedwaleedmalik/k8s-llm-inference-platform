name: lint-docs

on:
  pull_request:
    paths:
      - docs/public/**
      - .vale.ini
      - styles/**
      - .github/workflows/lint-docs.yml
  push:
    branches: [main]
    paths:
      - docs/public/**
      - .vale.ini
      - styles/**

jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: errata-ai/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # v2.1.2
        with:
          files: docs/public
          fail_on_error: true
