# oauth2-proxy secrets, ESO-synced. client-secret is the SAME shared secret Dex's `oauth2-proxy`
# staticClient uses (dex-oauth2-proxy-client-secret). cookie-secret is a random 32-byte value the
# operator generates. client-id is the literal "oauth2-proxy" (templated, not secret). Populate:
#   openssl rand -hex 32 | tr -d '\n' | gcloud secrets create dex-oauth2-proxy-client-secret --data-file=- --project <projectID>
#   openssl rand -hex 16 | gcloud secrets create oauth2-proxy-cookie-secret --data-file=- --project <projectID>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        client-id: "oauth2-proxy"
        client-secret: "{{ .clientSecret }}"
        cookie-secret: "{{ .cookieSecret }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: dex-oauth2-proxy-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: cookieSecret
      remoteRef:
        key: oauth2-proxy-cookie-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
