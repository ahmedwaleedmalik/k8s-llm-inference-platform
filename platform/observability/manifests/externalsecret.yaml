# Grafana OIDC client secret (ADR-0026). Shared value with the Dex `grafana` staticClient.
# Consumed by grafana via envValueFrom -> GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET. Populate the backend:
#   openssl rand -hex 32 | tr -d '\n' | gcloud secrets create dex-grafana-client-secret --data-file=- --project "$PROJECT"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: grafana-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        client-secret: "{{ .clientSecret }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: dex-grafana-client-secret
        metadataPolicy: None
        nullBytePolicy: Ignore
