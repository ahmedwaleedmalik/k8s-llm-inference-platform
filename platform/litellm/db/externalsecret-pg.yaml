# Postgres app credentials for CloudNativePG + LiteLLM. ESO materializes a basic-auth secret;
# `username` is the literal owner (`litellm`), `password` comes from GCP Secret Manager
# (`litellm-db-password`). Both CNPG (bootstrap.initdb.secret) and the LiteLLM chart (db.secret)
# read this one secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-pg-app
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: litellm-pg-app
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/basic-auth
      data:
        username: litellm
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: litellm-db-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
