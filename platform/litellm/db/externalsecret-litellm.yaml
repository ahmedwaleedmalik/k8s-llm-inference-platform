# LiteLLM proxy secrets, materialized by ESO from GCP Secret Manager. The chart's
# `masterkeySecretName` reads PROXY_MASTER_KEY; `environmentSecrets` injects every key here as an
# env var (so LITELLM_SALT_KEY + UPSTREAM_API_KEY reach the proxy). LITELLM_SALT_KEY is WRITE-ONCE
# (it encrypts provider keys in the DB — never rotate). UPSTREAM_API_KEY = the vllm-api-key,
# presented to the gateway/vLLM upstream. (Provider keys for external models live in agentgateway,
# not here — ADR-0013 Amendment routes them through the egress backend; see routing/.../egress.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secrets
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: litellm-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        PROXY_MASTER_KEY: "{{ .master }}"
        LITELLM_SALT_KEY: "{{ .salt }}"
        UPSTREAM_API_KEY: "{{ .vllm }}"
        GENERIC_CLIENT_SECRET: "{{ .genericClientSecret }}"
  data:
    - secretKey: master
      remoteRef:
        key: litellm-master-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: salt
      remoteRef:
        key: litellm-salt-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: vllm
      remoteRef:
        key: vllm-api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: genericClientSecret
      remoteRef:
        key: dex-litellm-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
