# Read-only Postgres credential for the Grafana spend dashboard. ESO materializes a
# basic-auth secret CNPG consumes for the `grafana_ro` managed role (cluster.yaml); `username`
# MUST equal the role name. Password comes from GCP Secret Manager (`litellm-grafana-ro-password`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-grafana-ro
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: litellm-grafana-ro
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/basic-auth
      data:
        username: grafana_ro
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: litellm-grafana-ro-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
