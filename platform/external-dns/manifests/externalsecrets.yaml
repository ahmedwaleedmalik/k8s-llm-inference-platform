# Cloudflare API token, ESO-synced from GCP Secret Manager into BOTH namespaces that need it:
# external-dns (record management) and cert-manager (DNS-01 challenge). Same remote key, same scopes
# (Zone:Read + DNS:Edit). The token never lives in git. Populate once:
#   echo -n "<cf-token>" | gcloud secrets create cloudflare-api-token --data-file=- --project <projectID>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare-api-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare-api-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
