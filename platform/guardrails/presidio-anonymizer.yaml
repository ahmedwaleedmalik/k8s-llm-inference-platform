apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-anonymizer
  namespace: guardrails
  labels:
    app: presidio-anonymizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presidio-anonymizer
  template:
    metadata:
      labels:
        app: presidio-anonymizer
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: presidio-anonymizer
          image: mcr.microsoft.com/presidio-anonymizer:2.2.361@sha256:022fc4bb42cd43b0c27526b6a0394b2b14aaf4b972a4814845eb8b48761bee7b
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: presidio-anonymizer
  namespace: guardrails
  labels:
    app: presidio-anonymizer
spec:
  selector:
    app: presidio-anonymizer
  ports:
    - port: 3000
      targetPort: 3000
