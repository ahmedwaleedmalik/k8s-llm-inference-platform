# EXAMPLE (not synced) — the pattern for every runtime secret.
# Copy into a layer that needs a secret; ESO fetches the value from the store and
# materializes a native k8s Secret. Only this reference lives in git — never the value.
#
# Populate the backing value first:
#   echo -n "<value>" | gcloud secrets create example-token --data-file=- --project "$PROJECT"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: example-token
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: example-token # the k8s Secret ESO creates
    creationPolicy: Owner
  data:
    - secretKey: token # key inside the k8s Secret
      remoteRef:
        key: example-token # secret name in GCP Secret Manager
