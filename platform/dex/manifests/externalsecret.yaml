# Dex secrets, ESO-synced from GCP Secret Manager (never in git): the static admin bcrypt hash
# (DEX_ADMIN_PASSWORD_HASH, read by staticPasswords[].hashFromEnv) plus the OIDC client secrets. Add
# dex-<app>-client-secret keys here as you wire ArgoCD/Grafana/Open WebUI/Tabby SSO.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-secrets
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: dex-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DEX_ADMIN_PASSWORD_HASH
      remoteRef:
        key: dex-admin-hash
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: dex-oauth2-proxy-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: ARGOCD_CLIENT_SECRET
      remoteRef:
        key: dex-argocd-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: LITELLM_CLIENT_SECRET
      remoteRef:
        key: dex-litellm-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GRAFANA_CLIENT_SECRET
      remoteRef:
        key: dex-grafana-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OPENWEBUI_CLIENT_SECRET
      remoteRef:
        key: dex-open-webui-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: TABBY_CLIENT_SECRET
      remoteRef:
        key: dex-tabby-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
