# Embeddings — Text Embeddings Inference (TEI) serving bge-base-en-v1.5 for @codebase / RAG
# (Tabby code-search, Open WebUI RAG, future RAG). CPU (~140M model, no GPU). Registered in LiteLLM
# (model_name: embeddings) so it sits behind the same gateway + virtual keys as the chat/coder models.
# VERIFY before deploy: the TEI image tag (latest CPU build) and that nomic-embed-v1.5 serves the
# OpenAI /v1/embeddings route on this TEI version (older TEI only exposed the native /embed).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embeddings
  namespace: serving
  labels:
    app.kubernetes.io/name: embeddings
spec:
  replicas: 1
  strategy:
    type: Recreate     # single replica + RWO PVC: kill old before new (else new pod Pends on Multi-Attach)
  selector:
    matchLabels:
      app.kubernetes.io/name: embeddings
  template:
    metadata:
      labels:
        app.kubernetes.io/name: embeddings
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7@sha256:22eac176ead3eb7008c672123b05331347e1a86661a7f27f3f6550dbe31ff96c
          imagePullPolicy: Always
          args:
            # bge-base-en-v1.5 (MIT, TEI reference model, parses cleanly). nomic-embed-text-v1.5 is
            # preferred for code/long-context (8192 ctx) but its config.json has a duplicate
            # `max_position_embeddings` that TEI's strict parser rejects ("Failed to parse config.json")
            # — switch back via a pinned `--revision` or a newer TEI build.
            - --model-id=BAAI/bge-base-en-v1.5
            # Port 8080 (not 80): runAsNonRoot + drop ALL caps removes CAP_NET_BIND_SERVICE, so the
            # process cannot bind a privileged (<1024) port. The Service keeps port 80 via targetPort: http.
            - --port=8080
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HF_HOME
              value: /data
            # readOnlyRootFilesystem: redirect HOME off the image rootfs onto the writable /tmp emptyDir;
            # the model snapshot lives on the /data PVC.
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cache
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 30      # first boot downloads the model (~550MB)
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: embeddings-cache
        - name: tmp
          emptyDir: {}
