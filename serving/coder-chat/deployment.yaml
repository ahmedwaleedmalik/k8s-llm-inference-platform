# Coder CHAT endpoint — Qwen2.5-Coder-7B-Instruct, AWQ 4-bit so it fits the L4 (24GB) with
# room for a 16k KV cache (fp16 7B would be ~15GB + KV, too tight). Same raw-vllm pattern: replicas 0
# ($0 idle), GPU-type-agnostic, HF fully offline (init pre-stages weights, ADR-0016).
# CAPACITY: this requests a whole nvidia.com/gpu. Running it AND coder-fim concurrently on one L4
# (GPUS_ALL_REGIONS=1) needs GPU time-slicing or a 2nd GPU — until then, serve one at a time.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coder-chat
  namespace: serving
  labels:
    app.kubernetes.io/name: coder-chat
  annotations:
    checkov.io/skip1: CKV_K8S_35=vLLM reads its API key only from the VLLM_API_KEY env var; file-mounted secrets are not supported by the server
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: coder-chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coder-chat
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: prestage-weights
          image: vllm/vllm-openai:v0.23.0@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f
          imagePullPolicy: Always
          command:
            - python3
            - -c
            - |
              from huggingface_hub import snapshot_download as d
              m = "Qwen/Qwen2.5-Coder-7B-Instruct-AWQ"
              try:
                  d(m, local_files_only=True)
              except Exception:
                  d(m)
          env:
            - name: HF_HOME
              value: /models
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 6Gi
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.23.0@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f
          imagePullPolicy: Always
          args:
            - --model=Qwen/Qwen2.5-Coder-7B-Instruct-AWQ
            - --served-model-name=qwen2.5-coder-7b-instruct
            - --quantization=awq_marlin       # Ada (L4) supports the faster Marlin AWQ kernels
            - --gpu-memory-utilization=0.9
            - --max-model-len=16384           # AWQ frees VRAM → a 16k coding context fits the L4
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm-api-key          # shared serving-namespace key (created by raw-vllm app)
                  key: api-key
            - name: HF_HOME
              value: /models
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
            limits:
              cpu: "4"
              memory: 20Gi
              nvidia.com/gpu: 1
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 90              # 7B + AWQ load + CUDA-graph capture is slower than 0.5B
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: coder-chat-model-cache
        - name: tmp
          emptyDir: {}
