# Coder FIM (fill-in-the-middle) endpoint — Qwen2.5-Coder-1.5B, the BASE model (NOT Instruct:
# instruct models mangle the FIM control tokens). FIM is served over raw /v1/completions; the CLIENT
# formats the prompt with the Qwen FIM tokens (<|fim_prefix|> … <|fim_suffix|> … <|fim_middle|>) —
# no special server flag. Same raw-vllm pattern (replicas 0, GPU-agnostic, HF-offline). 1.5B fp16
# (~3GB) fits the L4 easily. CAPACITY: see coder-chat — concurrent chat+FIM on one L4 needs GPU
# time-slicing / a 2nd GPU.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coder-fim
  namespace: serving
  labels:
    app.kubernetes.io/name: coder-fim
  annotations:
    checkov.io/skip1: CKV_K8S_35=vLLM reads its API key only from the VLLM_API_KEY env var; file-mounted secrets are not supported by the server
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: coder-fim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coder-fim
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: prestage-weights
          image: vllm/vllm-openai:v0.23.0@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f
          imagePullPolicy: Always
          command:
            - python3
            - -c
            - |
              from huggingface_hub import snapshot_download as d
              m = "Qwen/Qwen2.5-Coder-1.5B"
              try:
                  d(m, local_files_only=True)
              except Exception:
                  d(m)
          env:
            - name: HF_HOME
              value: /models
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.23.0@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f
          imagePullPolicy: Always
          args:
            - --model=Qwen/Qwen2.5-Coder-1.5B
            - --served-model-name=qwen2.5-coder-1.5b
            - --gpu-memory-utilization=0.5    # small model; leave VRAM headroom (time-slicing target)
            - --max-model-len=8192
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm-api-key          # shared serving-namespace key (created by raw-vllm app)
                  key: api-key
            - name: HF_HOME
              value: /models
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: 1
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: coder-fim-model-cache
        - name: tmp
          emptyDir: {}
