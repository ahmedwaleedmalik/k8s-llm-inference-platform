# replicas: 2 → two GPU-backed endpoints so the GIE EPP has >1 backend to load-balance across.
# RollingUpdate (overrides the base's Recreate): with >=2 GPUs a surge pod can land on the second
# GPU, so a zero-downtime roll is possible — the single-GPU deadlock that forces Recreate in the
# base no longer applies. maxUnavailable: 0 keeps one replica serving throughout the roll (HA).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raw-vllm
  annotations:
    # Kustomize strategic-merge patch: only overrides replicas/strategy. Pod + container hardening
    # (securityContext, high UID, seccomp, SA-token, namespace) is inherited from the serving/raw-vllm base.
    checkov.io/skip1: CKV_K8S_29=strategic-merge patch; security context inherited from the serving/raw-vllm base
    checkov.io/skip2: CKV_K8S_31=strategic-merge patch; seccomp profile inherited from the serving/raw-vllm base
    checkov.io/skip3: CKV_K8S_40=strategic-merge patch; runAsUser inherited from the serving/raw-vllm base
    checkov.io/skip4: CKV_K8S_38=strategic-merge patch; automountServiceAccountToken inherited from the serving/raw-vllm base
    checkov.io/skip5: CKV_K8S_23=strategic-merge patch; runAsNonRoot inherited from the serving/raw-vllm base
    checkov.io/skip6: CKV_K8S_21=strategic-merge patch; namespace is set on the serving/raw-vllm base
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
