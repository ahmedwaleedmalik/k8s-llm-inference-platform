# HuggingFace read token, fetched from GCP Secret Manager via ESO (same keyless pattern as
# vllm-api-key — value never in git). vLLM uses it to authenticate model pulls; HF 429-rate-limits
# anonymous IPs. Populate the backing secret once:
#   printf '%s' '<hf_read_token>' | gcloud secrets create hf-token --data-file=- --project "$PROJECT"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hf-token
  namespace: kserve
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: hf-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: hf-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
