# KServe controller (kserve-resources chart v0.19.0). Wave 2: after CRDs + cert-manager webhook.
# Standard mode + Gateway API via agentgateway (values: platform/kserve/values.yaml). OCI Helm +
# git values ref. See ADR-0006 + runbook kserve.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kserve
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  sources:
    - repoURL: ghcr.io/kserve/charts
      chart: kserve-resources
      targetRevision: v0.19.0
      helm:
        valueFiles:
          - $values/platform/kserve/values.yaml
    - repoURL: https://github.com/ahmedwaleedmalik/k8s-llm-inference-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kserve
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
