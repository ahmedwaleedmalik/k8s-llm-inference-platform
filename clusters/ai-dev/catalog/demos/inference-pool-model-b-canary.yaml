# model-b canary InferencePool + EPP. Wave 3. releaseName=model-b-canary names the InferencePool
# CR the HTTPRoute references as the 10% backend.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inference-pool-model-b-canary
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  sources:
    - repoURL: registry.k8s.io/gateway-api-inference-extension/charts
      chart: inferencepool
      targetRevision: v1.5.0
      helm:
        releaseName: model-b-canary
        valueFiles:
          - $values/routing/gateway-api-inference/inferencepool/values-model-b-canary.yaml
    - repoURL: https://github.com/ahmedwaleedmalik/k8s-llm-inference-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: inference
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
