# Shared serving secrets. Auto-sync: no GPU pods, just ExternalSecrets that materialize cheap
# prerequisites for later manual serving bring-up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: serving-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/ahmedwaleedmalik/k8s-llm-inference-platform.git
    targetRevision: main
    path: serving/secret-refs
  destination:
    server: https://kubernetes.default.svc
    namespace: serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
