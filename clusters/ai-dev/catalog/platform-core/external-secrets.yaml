# External Secrets Operator (ESO) — the runtime secrets mechanism.
# Pulls secret VALUES from an external store (GCP Secret Manager) into native k8s
# Secrets. No secret values ever live in git — only ExternalSecret references.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # operator + CRDs before any ClusterSecretStore/ExternalSecret
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.6.0
      helm:
        valueFiles:
          - $values/platform/external-secrets/values.yaml
    - repoURL: https://github.com/ahmedwaleedmalik/k8s-llm-inference-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # ESO CRDs are large
