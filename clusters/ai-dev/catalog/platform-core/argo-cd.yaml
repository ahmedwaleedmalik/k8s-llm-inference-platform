# Argo CD self-management: after the initial helm install (bootstrap/install.sh),
# Argo CD manages itself from Git using the same pinned chart + values.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.21
      helm:
        valueFiles:
          - $values/bootstrap/argo-cd/values.yaml
    - repoURL: https://github.com/ahmedwaleedmalik/k8s-llm-inference-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true # Argo CD CRDs exceed the client-side apply annotation limit
