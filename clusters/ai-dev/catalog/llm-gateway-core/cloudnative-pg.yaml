# CloudNativePG operator (chart 0.28.3 / operator 1.29.1). Wave 1 (with other operators/CRDs):
# installs the postgresql.cnpg.io CRDs + controller the LiteLLM Cluster CR depends on. Ships its
# own webhook certs (no cert-manager dep). OCI Helm chart + git values ref.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  sources:
    - repoURL: ghcr.io/cloudnative-pg/charts
      chart: cloudnative-pg
      targetRevision: 0.28.3
      helm:
        releaseName: cnpg
        valueFiles:
          - $values/platform/cloudnative-pg/values.yaml
    - repoURL: https://github.com/ahmedwaleedmalik/k8s-llm-inference-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
