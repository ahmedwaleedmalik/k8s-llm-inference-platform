# PLACEHOLDER store for a non-gcpsm secret_backend — the operator fills spec.provider per the ESO
# provider docs (https://external-secrets.io/latest/provider/). Only the semantic content (an empty
# provider map) is compared; norm() drops these comments.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: secret-store
spec:
  provider: {}
