# Each team gets a namespaced LocalQueue handle onto the shared gpu-cq. A Job opts in with
# the label `kueue.x-k8s.io/queue-name: team-a-gpu` (or team-b-gpu).
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: team-a-gpu
  namespace: team-a
spec:
  clusterQueue: gpu-cq
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: team-b-gpu
  namespace: team-b
spec:
  clusterQueue: gpu-cq
