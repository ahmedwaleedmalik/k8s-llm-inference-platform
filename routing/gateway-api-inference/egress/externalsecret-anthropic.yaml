# Anthropic provider key, ESO-synced from GCP Secret Manager (never in git). The k8s Secret key MUST
# be `Authorization` — agentgateway's AgentgatewayBackend auth.secretRef reads exactly that key and
# forwards it to Anthropic as `x-api-key`. Co-located in agentgateway-system because the backend's
# secretRef resolves in the backend's own namespace.
#
# Seed the GSM value first (one-time):
#   echo -n "sk-ant-..." | gcloud secrets create anthropic-api-key --data-file=- --project "$PROJECT"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anthropic-api-key
  namespace: agentgateway-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: anthropic-api-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: Authorization
      remoteRef:
        key: anthropic-api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
