# vLLM simulator backend — OpenAI-compatible and exposes the vLLM metric surface the EPP
# scrapes (KV-cache utilization, queue depth), with NO GPU. 3 replicas so the EPP has a real
# choice to make: it routes each request to the least-loaded endpoint, not round-robin. This
# is the whole point of inference-aware routing and what a plain L7 load balancer cannot do.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sim
  labels:
    app: vllm-sim
  annotations:
    checkov.io/skip1: CKV_K8S_21=namespace is assigned by the ArgoCD Application destination, not hardcoded
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vllm-sim
  template:
    metadata:
      labels:
        app: vllm-sim
        inference.networking.k8s.io/engine-type: vllm
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vllm-sim
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2@sha256:c3ba435081a4d032676b218ea34eb3a1c54507da0fade2f6297f9c37894fe0d1
          imagePullPolicy: Always
          args:
            - "--model"
            - "Qwen/Qwen3-0.6B"
            - "--port"
            - "8000"
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
