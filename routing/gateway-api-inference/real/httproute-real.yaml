# Real-model rule for raw-vLLM. Lives in `serving` (same namespace as the InferencePool it
# targets) so the backendRef is same-namespace — agentgateway does not honor a ReferenceGrant for
# cross-namespace InferencePool backendRefs. The route attaches cross-namespace to the shared
# `inference-gateway` (parentRef namespace: inference), permitted by that gateway's allowedRoutes.
# Match value = raw-vLLM's --served-model-name (qwen2.5-0.5b-instruct); the gateway forwards the
# request body unchanged, so the client's `model` must be the name vLLM serves under or vLLM 404s.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route-real
  namespace: serving
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: inference-gateway
      namespace: inference
  rules:
    - matches:
        - headers:
            - type: Exact
              name: X-Gateway-Base-Model-Name
              value: qwen2.5-0.5b-instruct
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: raw-vllm
      timeouts:
        request: 300s
