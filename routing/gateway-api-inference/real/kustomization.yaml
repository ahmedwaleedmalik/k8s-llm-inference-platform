# Real raw-vLLM path: the HTTPRoute + InferenceObjective, both in `serving` (same namespace as the
# raw-vllm InferencePool). No ReferenceGrant — the route's backendRef is same-namespace; only the
# route→gateway attachment is cross-namespace (allowed by the gateway's allowedRoutes).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: serving
resources:
  - httproute-real.yaml
  - inferenceobjective.yaml
