# Admin-UI routes: expose ArgoCD + Grafana at their own subdomains. Each route is co-located
# with its Service's namespace (no cross-ns backendRef). The apps authenticate via their own Dex OIDC
# — uncomment those blocks before relying on SSO. ai-platform.wmx.dev → fork-init.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: platform-gateway
      namespace: experience
      sectionName: argocd-https
  hostnames:
    - argocd.ai-platform.wmx.dev
  rules:
    - backendRefs:
        - name: argo-cd-argocd-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: platform-gateway
      namespace: experience
      sectionName: grafana-https
  hostnames:
    - grafana.ai-platform.wmx.dev
  rules:
    - backendRefs:
        - name: observability-grafana
          port: 80
