apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The public edge: Let's Encrypt issuers + platform-gateway + HTTPRoutes. Each manifest
# carries its own namespace (experience / litellm) — NO namespace transformer here, so the api route
# lands in litellm next to its Service. Manual-sync; activate only after setting config.yaml domain.
resources:
  - cluster-issuer.yaml
  - gateway.yaml
  - httproutes.yaml
  - admin-ui-routes.yaml
