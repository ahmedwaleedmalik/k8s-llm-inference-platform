<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 838" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F1F4F9"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F7FB"/><stop offset="1" stop-color="#E9EEF5"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4F6BF6"/><stop offset="0.5" stop-color="#C77E12"/><stop offset="1" stop-color="#64748B"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
      .eye  { fill:#94A3B8; letter-spacing:3px; font-size:12px; font-weight:600; }
      .h1   { fill:#0F172A; font-size:30px; font-weight:700; letter-spacing:-0.5px; }
      .sub  { fill:#64748B; font-size:13.5px; }
      .lyr  { fill:#0F172A; font-size:19px; font-weight:700; letter-spacing:-0.3px; }
      .desc { fill:#64748B; font-size:13px; }
      .idx  { font-size:14px; font-weight:700; }
      .tag  { fill:#F1F5F9; stroke:#CBD5E1; stroke-width:1; }
      .tagt { fill:#475569; font-size:12px; }
      .lip  { fill:#DBE2EC; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="838" rx="20" fill="#FBFCFE" stroke="#E6EBF2" stroke-width="1.2"/>

  <!-- header -->
  <text x="56" y="50" class="eye mono">ARCHITECTURE</text>
  <text x="56" y="82" class="h1">LLM Inference Stack</text>
  <text x="56" y="106" class="sub">Request path top to bottom, GitOps-reconciled on Kubernetes</text>

  <!-- request flow spine -->
  <text x="58" y="142" class="eye mono" text-anchor="middle" fill="#94A3B8">REQ</text>
  <line x1="58" y1="156" x2="58" y2="700" stroke="url(#flow)" stroke-width="2.5"/>
  <polygon points="58,712 52,700 64,700" fill="#64748B"/>

  <!-- ============ LAYER 01 — Experience ============ -->
  <g>
    <rect x="80" y="122" width="784" height="92" rx="14" class="lip"/>
    <rect x="80" y="118" width="784" height="92" rx="14" fill="url(#plate)" stroke="#DCE3EC" stroke-width="1.2"/>
    <circle cx="58" cy="164" r="4.5" fill="#4F6BF6"/><circle cx="58" cy="164" r="9" fill="none" stroke="#4F6BF6" stroke-width="1" opacity="0.5"/>
    <rect x="100" y="141" width="4" height="46" rx="2" fill="#4F6BF6"/>
    <text x="120" y="168" class="idx mono" fill="#4F6BF6">01</text>
    <text x="158" y="162" class="lyr">Experience</text>
    <text x="158" y="184" class="desc">Developer and end-user surfaces</text>
    <g class="mono"><rect x="612" y="151" width="92" height="26" rx="7" class="tag"/><text x="658" y="168" class="tagt" text-anchor="middle">Open WebUI</text>
    <rect x="714" y="151" width="57" height="26" rx="7" class="tag"/><text x="742" y="168" class="tagt" text-anchor="middle">demos</text>
    <rect x="781" y="151" width="43" height="26" rx="7" class="tag"/><text x="802" y="168" class="tagt" text-anchor="middle">SDK</text></g>
  </g>

  <!-- ============ LAYER 02 — Tenant edge ============ -->
  <g>
    <rect x="80" y="228" width="784" height="92" rx="14" class="lip"/>
    <rect x="80" y="224" width="784" height="92" rx="14" fill="url(#plate)" stroke="#DCE3EC" stroke-width="1.2"/>
    <circle cx="58" cy="270" r="4.5" fill="#15A877"/><circle cx="58" cy="270" r="9" fill="none" stroke="#15A877" stroke-width="1" opacity="0.5"/>
    <rect x="100" y="247" width="4" height="46" rx="2" fill="#15A877"/>
    <text x="120" y="274" class="idx mono" fill="#15A877">02</text>
    <text x="158" y="268" class="lyr">Tenant edge · LiteLLM</text>
    <text x="158" y="290" class="desc">Tenancy boundary: identity, budgets, guardrails</text>
    <g class="mono"><rect x="468" y="241" width="106" height="26" rx="7" class="tag"/><text x="521" y="258" class="tagt" text-anchor="middle">virtual keys</text>
    <rect x="584" y="241" width="71" height="26" rx="7" class="tag"/><text x="619" y="258" class="tagt" text-anchor="middle">budgets</text>
    <rect x="665" y="241" width="106" height="26" rx="7" class="tag"/><text x="718" y="258" class="tagt" text-anchor="middle">spend ledger</text>
    <rect x="781" y="241" width="43" height="26" rx="7" class="tag"/><text x="802" y="258" class="tagt" text-anchor="middle">SSO</text>
    <rect x="655" y="273" width="169" height="26" rx="7" class="tag"/><text x="739" y="290" class="tagt" text-anchor="middle">PII + injection guard</text></g>
  </g>

  <!-- ============ LAYER 03 — Routing ============ -->
  <g>
    <rect x="80" y="334" width="784" height="92" rx="14" class="lip"/>
    <rect x="80" y="330" width="784" height="92" rx="14" fill="url(#plate)" stroke="#DCE3EC" stroke-width="1.2"/>
    <circle cx="58" cy="376" r="4.5" fill="#C77E12"/><circle cx="58" cy="376" r="9" fill="none" stroke="#C77E12" stroke-width="1" opacity="0.5"/>
    <rect x="100" y="353" width="4" height="46" rx="2" fill="#C77E12"/>
    <text x="120" y="380" class="idx mono" fill="#C77E12">03</text>
    <text x="158" y="374" class="lyr">Inference-aware routing</text>
    <text x="158" y="396" class="desc">Gateway API Inference Extension on agentgateway</text>
    <g class="mono"><rect x="605" y="363" width="43" height="26" rx="7" class="tag"/><text x="626" y="380" class="tagt" text-anchor="middle">GIE</text>
    <rect x="658" y="363" width="113" height="26" rx="7" class="tag"/><text x="714" y="380" class="tagt" text-anchor="middle">InferencePool</text>
    <rect x="781" y="363" width="43" height="26" rx="7" class="tag"/><text x="802" y="380" class="tagt" text-anchor="middle">EPP</text></g>
  </g>

  <!-- ============ LAYER 04 — Serving ============ -->
  <g>
    <rect x="80" y="440" width="784" height="92" rx="14" class="lip"/>
    <rect x="80" y="436" width="784" height="92" rx="14" fill="url(#plate)" stroke="#DCE3EC" stroke-width="1.2"/>
    <circle cx="58" cy="482" r="4.5" fill="#DC4A6B"/><circle cx="58" cy="482" r="9" fill="none" stroke="#DC4A6B" stroke-width="1" opacity="0.5"/>
    <rect x="100" y="459" width="4" height="46" rx="2" fill="#DC4A6B"/>
    <text x="120" y="486" class="idx mono" fill="#DC4A6B">04</text>
    <text x="158" y="480" class="lyr">Serving runtime</text>
    <text x="158" y="502" class="desc">OpenAI-compatible model servers</text>
    <g class="mono"><rect x="633" y="469" width="50" height="26" rx="7" class="tag"/><text x="658" y="486" class="tagt" text-anchor="middle">vLLM</text>
    <rect x="693" y="469" width="64" height="26" rx="7" class="tag"/><text x="725" y="486" class="tagt" text-anchor="middle">KServe</text>
    <rect x="767" y="469" width="57" height="26" rx="7" class="tag"/><text x="795" y="486" class="tagt" text-anchor="middle">llm-d</text></g>
  </g>

  <!-- ============ LAYER 05 — GPU scheduling ============ -->
  <g>
    <rect x="80" y="546" width="784" height="92" rx="14" class="lip"/>
    <rect x="80" y="542" width="784" height="92" rx="14" fill="url(#plate)" stroke="#DCE3EC" stroke-width="1.2"/>
    <circle cx="58" cy="588" r="4.5" fill="#1894C2"/><circle cx="58" cy="588" r="9" fill="none" stroke="#1894C2" stroke-width="1" opacity="0.5"/>
    <rect x="100" y="565" width="4" height="46" rx="2" fill="#1894C2"/>
    <text x="120" y="592" class="idx mono" fill="#1894C2">05</text>
    <text x="158" y="586" class="lyr">GPU scheduling and scaling</text>
    <text x="158" y="608" class="desc">Quota admission, queue-driven autoscale, telemetry</text>
    <g class="mono"><rect x="647" y="575" width="57" height="26" rx="7" class="tag"/><text x="675" y="592" class="tagt" text-anchor="middle">Kueue</text>
    <rect x="714" y="575" width="50" height="26" rx="7" class="tag"/><text x="739" y="592" class="tagt" text-anchor="middle">KEDA</text>
    <rect x="774" y="575" width="50" height="26" rx="7" class="tag"/><text x="799" y="592" class="tagt" text-anchor="middle">DCGM</text></g>
  </g>

  <!-- ============ LAYER 06 — Substrate ============ -->
  <g>
    <rect x="80" y="652" width="784" height="92" rx="14" class="lip"/>
    <rect x="80" y="648" width="784" height="92" rx="14" fill="url(#plate)" stroke="#DCE3EC" stroke-width="1.2"/>
    <circle cx="58" cy="694" r="4.5" fill="#64748B"/><circle cx="58" cy="694" r="9" fill="none" stroke="#64748B" stroke-width="1" opacity="0.5"/>
    <rect x="100" y="671" width="4" height="46" rx="2" fill="#64748B"/>
    <text x="120" y="698" class="idx mono" fill="#64748B">06</text>
    <text x="158" y="692" class="lyr">Cloud substrate · OpenTofu</text>
    <text x="158" y="714" class="desc">GKE cluster and Workload Identity</text>
    <g class="mono"><rect x="532" y="667" width="141" height="26" rx="7" class="tag"/><text x="602" y="684" class="tagt" text-anchor="middle">Workload Identity</text>
    <rect x="683" y="667" width="141" height="26" rx="7" class="tag"/><text x="753" y="684" class="tagt" text-anchor="middle">Artifact Registry</text>
    <rect x="679" y="699" width="43" height="26" rx="7" class="tag"/><text x="700" y="716" class="tagt" text-anchor="middle">GKE</text>
    <rect x="732" y="699" width="92" height="26" rx="7" class="tag"/><text x="778" y="716" class="tagt" text-anchor="middle">node pools</text></g>
  </g>

  <!-- ============ foundation plinth ============ -->
  <rect x="64" y="762" width="816" height="58" rx="12" fill="url(#base)" stroke="#D6DEEA" stroke-width="1.2"/>
  <text x="88" y="789" class="eye mono" fill="#94A3B8">FOUNDATION</text>
  <text x="88" y="806" class="desc">spans every layer</text>
  <g class="mono"><rect x="404" y="778" width="120" height="26" rx="7" class="tag"/><text x="464" y="795" class="tagt" text-anchor="middle">Argo CD GitOps</text>
  <rect x="534" y="778" width="134" height="26" rx="7" class="tag"/><text x="601" y="795" class="tagt" text-anchor="middle">External Secrets</text>
  <rect x="678" y="778" width="162" height="26" rx="7" class="tag"/><text x="759" y="795" class="tagt" text-anchor="middle">Prometheus + Grafana</text></g>
</svg>
