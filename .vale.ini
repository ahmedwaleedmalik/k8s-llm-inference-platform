StylesPath = styles
MinAlertLevel = error
Packages = Google
Vocab = Repo

[*.md]
BasedOnStyles = Vale, Google

Vale.Spelling = NO
Vale.Terms = NO
Google.Units = NO
Google.Latin = NO
Google.LyHyphens = NO
Google.Ordinal = NO
# conflicts with quoting exact API error strings verbatim (period belongs outside the quoted string)
Google.Quotes = NO

# Decision records quote tool output and config verbatim; relax the strictest prose rules there.
[decisions/*.md]
Google.Passive = NO
Google.WordList = NO
