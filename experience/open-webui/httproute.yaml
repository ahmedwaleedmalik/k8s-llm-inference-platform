# chat.<domain> -> Open WebUI. Optional route lives with the optional backend so the always-on edge
# app does not report BackendNotFound before Open WebUI is manually synced.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat
  namespace: experience
spec:
  parentRefs:
    - name: platform-gateway
      namespace: experience
      sectionName: chat-https
  hostnames:
    - chat.ai-platform.wmx.dev
  rules:
    - backendRefs:
        - name: open-webui
          port: 8080
