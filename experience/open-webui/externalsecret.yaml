# Open WebUI OIDC client secret (ADR-0026). Shared value with the Dex `open-webui` staticClient.
# Separate from the seed-created openwebui-secrets (vkey + session key). Populate the backend:
#   openssl rand -hex 32 | tr -d '\n' | gcloud secrets create dex-open-webui-client-secret --data-file=- --project "$PROJECT"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-oidc
  namespace: experience
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: open-webui-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        client-secret: "{{ .clientSecret }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: dex-open-webui-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
