# Least-privilege identity for the in-cluster key minter. It reads ONLY the LiteLLM master key
# (cross-namespace, read-only, one secret) and writes ONLY the two derived experience secrets. The
# master key never leaves the litellm namespace; nothing here touches GCP IAM, so it is portable to any
# cluster (GKE, BYO, Hetzner).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-key-minter
  namespace: experience
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litellm-key-minter
  namespace: experience
rules:
  # create is not name-restrictable in RBAC; scoped to the experience namespace.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, patch, update]
    resourceNames: [openwebui-secrets, tabby-secrets]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litellm-key-minter
  namespace: experience
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: litellm-key-minter
subjects:
  - kind: ServiceAccount
    name: litellm-key-minter
    namespace: experience
---
# Cross-namespace read of just the LiteLLM master key — the only thing the minter needs from litellm.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litellm-key-minter-read
  namespace: litellm
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
    resourceNames: [litellm-secrets]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litellm-key-minter-read
  namespace: litellm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: litellm-key-minter-read
subjects:
  - kind: ServiceAccount
    name: litellm-key-minter
    namespace: experience
