# tabby.<domain> -> Tabby. Optional route lives with the optional backend so the always-on edge app
# does not report BackendNotFound before Tabby is manually synced.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tabby
  namespace: experience
spec:
  parentRefs:
    - name: platform-gateway
      namespace: experience
      sectionName: tabby-https
  hostnames:
    - tabby.ai-platform.wmx.dev
  rules:
    - backendRefs:
        - name: tabby
          port: 8080
