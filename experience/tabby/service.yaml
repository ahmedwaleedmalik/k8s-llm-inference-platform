# Tabby server endpoint — the IDE Tabby extension points here. Fronted at tabby.<domain> by the
# edge HTTPRoute (routing/edge/httproutes.yaml); or reach it via
# `kubectl -n experience port-forward svc/tabby 8080:8080` when the fork has no domain.
apiVersion: v1
kind: Service
metadata:
  name: tabby
  namespace: experience
  labels:
    app.kubernetes.io/name: tabby
spec:
  selector:
    app.kubernetes.io/name: tabby
  ports:
    - name: http
      port: 8080
      targetPort: http
