# n8n core secrets. N8N_ENCRYPTION_KEY is durable and random in the backend; host/port/protocol are
# non-secret values projected into the Secret because the official chart reads them from secretRefs.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-core-secrets
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: secret-store
  target:
    name: n8n-core-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        N8N_ENCRYPTION_KEY: "{{ .encryptionKey }}"
        N8N_HOST: n8n.ai-platform.wmx.dev
        N8N_PORT: "5678"
        N8N_PROTOCOL: https
  data:
    - secretKey: encryptionKey
      remoteRef:
        key: n8n-encryption-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
