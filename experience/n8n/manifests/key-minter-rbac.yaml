# Least-privilege n8n key minter: reads only the LiteLLM master key, writes only n8n's derived vkey.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-key-minter
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: n8n-key-minter
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, patch, update]
    resourceNames: [n8n-litellm-secrets]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-key-minter
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: n8n-key-minter
subjects:
  - kind: ServiceAccount
    name: n8n-key-minter
    namespace: n8n
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: n8n-key-minter-read
  namespace: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
    resourceNames: [litellm-secrets]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-key-minter-read
  namespace: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: n8n-key-minter-read
subjects:
  - kind: ServiceAccount
    name: n8n-key-minter
    namespace: n8n
