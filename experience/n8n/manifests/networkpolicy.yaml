# n8n may serve UI/webhooks through the shared gateway, and its AI provider path is LiteLLM only.
# Other outbound integrations stay closed until deliberately modeled as GitOps policy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: n8n-default-deny
  namespace: n8n
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/component: main
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: n8n-allow-gateway-ingress
  namespace: n8n
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/component: main
  policyTypes:
    - Ingress
  ingress:
    # The agentgateway DATAPLANE proxy runs in the Gateway's own namespace (experience), where
    # platform-gateway is defined, not in agentgateway-system (controller only). Ingress must allow
    # experience or the gateway->n8n hop fails with "upstream call failed: Connect: deadline elapsed".
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: experience
      ports:
        - protocol: TCP
          port: 5678
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: n8n-allow-litellm-egress
  namespace: n8n
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/component: main
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litellm
      ports:
        - protocol: TCP
          port: 4000
